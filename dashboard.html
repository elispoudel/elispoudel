        <div class="nav-icons">
          <div class="dark-mode-toggle">
            <button id="darkModeToggle" aria-label="Toggle dark mode">
              <i class="uil uil-moon" id="darkModeIcon"></i>
            </button>
          </div>
          <div class="profile-menu">
            <button id="profileMenuToggle" aria-label="Toggle profile menu" class="profile-avatar">
              <i class="uil uil-user-circle"></i>
              <span id="profileUsername" class="profile-name">Student</span>
            </button>
            <div id="profileDropdown" class="profile-dropdown">
              <div class="profile-item admin-panel-item" id="adminPanelItem" style="display:none;">
                <a href="admin-panel.html" style="display: flex; align-items: center; gap: 8px; color: inherit; text-decoration: none;">
                  <i class="uil uil-setting"></i>
                  <span>Admin Panel</span>
                </a>
              </div>
              <div class="profile-item logout-item" id="logoutDropdown">
                <i class="uil uil-sign-out-alt"></i>
                <span>Logout</span>
              </div>
            </div>
          </div>
          <div class="nav-menu-btn">
            <button id="mobileMenuToggle" aria-label="Toggle mobile menu" aria-expanded="false">
              <i class="uil uil-bars" id="mobileMenuIcon"></i>
            </button>
          </div>
        </div>

<br>
      <main class="wrapper" id="main-content" role="main">
        <section class="dashboard-page" aria-label="Dashboard">
          <div class="dashboard-container">
            <div class="profile-card glass-card">
              <div class="profile-header">
                <div class="profile-avatar-large">
                  <i class="uil uil-user-circle"></i>
                </div>
                <div class="profile-info">
                  <h2 class="profile-role">Student</h2>
                  <p class="profile-username" id="dashboardUsername">Username: pbs</p>
                  <p class="profile-status">Active</p>
                </div>
              </div>
            
                

            </div>
              <!-- Class cards (one card per class subject) -->
              <div class="class-cards" aria-label="Class cards">
                <div class="class-card" data-class="6">
                  <img src="assets/images/class_png_photo/6.png" alt="Class 6" class="class-thumb" />
                  <div class="class-content simple">
                    <h3 class="class-title">Class 6</h3>
                  </div>
                  <div class="class-arrow"><i class="uil uil-angle-right-b"></i></div>
                </div>

                <div class="class-card" data-class="7">
                  <img src="assets/images/class_png_photo/7.png" alt="Class 7" class="class-thumb" />
                  <div class="class-content simple">
                    <h3 class="class-title">Class 7</h3>
                  </div>
                  <div class="class-arrow"><i class="uil uil-angle-right-b"></i></div>
                </div>

                <div class="class-card" data-class="8">
                  <img src="assets/images/class_png_photo/8.png" alt="Class 8" class="class-thumb" />
                  <div class="class-content simple">
                    <h3 class="class-title">Class 8</h3>
                  </div>
                  <div class="class-arrow"><i class="uil uil-angle-right-b"></i></div>
                </div>

                <div class="class-card" data-class="9">
                  <img src="assets/images/class_png_photo/9.png" alt="Class 9" class="class-thumb" />
                  <div class="class-content simple">
                    <h3 class="class-title">Class 9</h3>
                  </div>
                  <div class="class-arrow"><i class="uil uil-angle-right-b"></i></div>
                </div>

                <div class="class-card" data-class="10">
                  <img src="assets/images/class_png_photo/10.png" alt="Class 10" class="class-thumb" />
                  <div class="class-content simple">
                    <h3 class="class-title">Class 10</h3>
                  </div>
                  <div class="class-arrow"><i class="uil uil-angle-right-b"></i></div>
                </div>
              </div>
          </div>
        </section>
