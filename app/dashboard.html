    <script>
      (function () {
        const savedUser = sessionStorage.getItem('loggedInUser') || localStorage.getItem('loggedInUser');
        const savedRole = sessionStorage.getItem('userRole') || localStorage.getItem('userRole');
        const loginUrl = (typeof SITE !== 'undefined' && SITE.pages && SITE.pages.login) ? SITE.pages.login : 'app/login.html';
        const adminUrl = (typeof SITE !== 'undefined' && SITE.pages && SITE.pages.admin) ? SITE.pages.admin : 'app/admin-panel.html';
        if (!savedUser) {
          window.location.href = loginUrl;
          return;
        }
        if (savedRole === 'admin') {
          // prevent admins from accessing student dashboard
          window.location.href = adminUrl;
          return;
        }
      })();
    </script>

    <script>
        // Load and display chapter data in class cards
        async function initDashboardChapters() {
            try {
                const chaptersData = await DriveService.fetchChapters();
                
                // Update each class card with chapter count
                const classIds = ['6', '7', '8', '9', '10'];
                classIds.forEach(classId => {
                    const card = document.querySelector(`.class-card[data-class="${classId}"]`);
                    if (card) {
                        const classData = chaptersData[classId];
                        const chapterCount = classData && classData.chapters ? classData.chapters.length : 0;
                        
                        const content = card.querySelector('.class-content');
                        if (content) {
                            const countHtml = chapterCount > 0 
                                ? `<p class="chapter-count" style="font-size: 0.85rem; color: var(--first-color); margin-top: 4px;"><i class="uil uil-book-open"></i> ${chapterCount} chapter${chapterCount !== 1 ? 's' : ''}</p>`
                                : `<p class="chapter-count" style="font-size: 0.85rem; color: var(--text-color-second); margin-top: 4px;">No chapters yet</p>`;
                            
                            const existingCount = content.querySelector('.chapter-count');
                            if (existingCount) {
                                existingCount.remove();
                            }
                            content.insertAdjacentHTML('beforeend', countHtml);
                        }
                    }
                });
            } catch (err) {
                console.error('Error loading chapters for dashboard:', err);
            }
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initDashboardChapters);
        
        // Listen for storage changes (when admin updates chapters)
        window.addEventListener('storage', (event) => {
            if (event.key === 'chaptersData' && event.newValue) {
                initDashboardChapters();
            }
        });
    </script>
