<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Chapter Management</title>
    
    <!-- --------- PWA META TAGS ---------- -->
    <meta name="theme-color" content="#6429ef" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Admin Panel" />
    
    <!-- --------- UNICONS ---------- -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css" />
    
    <!-- --------- CSS ---------- -->
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
            padding-top: calc(90px + 0.5cm);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--first-color);
        }

        .admin-header h1 {
            font-size: 1.8rem;
            color: var(--text-color-primary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-badge {
            background: var(--first-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .admin-header-actions {
            display: flex;
            align-items: center;
            margin-left: auto;
        }

        .admin-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .class-tabs {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--border-color, #e0e0e0);
            border-radius: 12px;
            padding: 1.5rem;
        }

        body.dark-mode .class-tabs {
            background: rgba(50, 50, 60, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .class-tabs h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-color-primary);
        }

        .class-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .class-tab {
            padding: 12px;
            background: white;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            color: var(--text-color-primary);
        }

        body.dark-mode .class-tab {
            background: rgba(100, 100, 120, 0.3);
        }

        .class-tab:hover {
            border-color: var(--first-color);
            background: rgba(100, 41, 239, 0.1);
        }

        body.dark-mode .class-tab:hover {
            background: rgba(100, 41, 239, 0.2);
        }

        .class-tab.active {
            background: var(--first-color);
            color: white;
            border-color: var(--first-color);
        }

        .chapters-management {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--border-color, #e0e0e0);
            border-radius: 12px;
            padding: 1.5rem;
        }

        body.dark-mode .chapters-management {
            background: rgba(50, 50, 60, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .chapters-management > h2 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .total-views-widget {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.14), rgba(100, 41, 239, 0.12));
            border: 1px solid rgba(255, 107, 107, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        }

        body.dark-mode .total-views-widget {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.16), rgba(100, 41, 239, 0.22));
            border-color: rgba(255, 107, 107, 0.18);
        }

        .total-views-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .total-views-icon {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 107, 107, 0.16);
            color: #f44336;
            font-size: 1.15rem;
        }

        .total-views-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-color-primary);
        }

        .total-views-subtitle {
            font-size: 0.8rem;
            color: var(--text-color-second);
        }

        .total-views-badge {
            min-width: 68px;
            padding: 0.5rem 0.85rem;
            border-radius: 999px;
            background: rgba(90, 90, 100, 0.16);
            color: var(--text-color-primary);
            font-weight: 700;
            text-align: center;
            font-size: 1rem;
        }

        .add-chapter-btn {
            padding: 10px 16px;
            background: var(--first-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .add-chapter-btn:hover {
            background: var(--first-color-hover);
            transform: translateY(-2px);
        }

        .chapters-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        .chapters-table th {
            background: var(--first-color);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-radius: 6px 6px 0 0;
        }

        .chapters-table tr:not(:last-child) {
            border-bottom: 1px solid var(--border-color, #e0e0e0);
        }

        .chapters-table td {
            padding: 12px;
            color: var(--text-color-primary);
        }

        .chapters-table tr:hover {
            background: rgba(100, 41, 239, 0.05);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .edit-btn, .delete-btn, .upload-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .edit-btn {
            background: #4CAF50;
            color: white;
        }

        .edit-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .delete-btn {
            background: #f44336;
            color: white;
        }

        .delete-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .upload-btn {
            background: #2196F3;
            color: white;
        }

        .upload-btn:hover {
            background: #0b7dda;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-color-second);
        }

        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--body-color);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: min(100%, 500px);
            max-height: calc(100vh - 2rem);
            overflow-y: auto;
            box-sizing: border-box;
            margin: 1rem;
        }

        body.dark-mode .modal-content {
            background: rgba(30, 30, 40, 0.95);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color, #e0e0e0);
        }

        body.dark-mode .modal-header {
            border-bottom-color: rgba(255, 255, 255, 0.1);
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-color-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color-second);
            padding: 0;
        }

        .modal-close:hover {
            color: var(--text-color-primary);
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color-primary);
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            min-width: 0;
            padding: 10px;
            border: 1px solid var(--border-color, #e0e0e0);
            border-radius: 6px;
            font-family: inherit;
            font-size: 16px;
            color: var(--text-color-primary);
            background: var(--body-color);
            transition: border-color 0.3s ease;
        }

        .form-group input[type="file"] {
            font-size: 16px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--first-color);
            box-shadow: 0 0 0 3px rgba(100, 41, 239, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            padding: 20px;
            border-top: 1px solid var(--border-color, #e0e0e0);
        }

        .btn-primary, .btn-secondary {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--first-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--first-color-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--text-color-second);
            color: white;
        }

        .btn-secondary:hover {
            background: var(--text-color-primary);
        }

        .success-message {
            background: #4CAF50;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-message {
            background: #f44336;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type='file'] {
            position: absolute;
            left: -9999px;
        }

        @media (max-width: 768px) {
            .admin-content {
                grid-template-columns: 1fr;
            }

            .chapters-table {
                font-size: 12px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .modal-content {
                width: calc(100% - 2rem);
                max-width: 100%;
                margin: 0 1rem;
            }

            .form-group label {
                font-size: 15px;
            }

            .form-group input,
            .form-group textarea {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav id="header" role="navigation" aria-label="Primary navigation">
            <div class="nav-logo">
                <a href="../index.html" class="nav-logo-profile">
                    <div class="nav-logo-text">
                        <p class="nav-name">Elis Poudel</p>
                    </div>
                </a>
            </div>
            <div class="nav-icons">
                <div class="dark-mode-toggle">
                    <button id="darkModeToggle" aria-label="Toggle dark mode">
                        <i class="uil uil-moon" id="darkModeIcon"></i>
                    </button>
                </div>
                <div class="profile-menu">
                    <button id="profileMenuToggle" aria-label="Toggle profile menu" class="profile-avatar">
                        <i class="uil uil-user-circle"></i>
                        <span id="profileUsername" class="profile-name">Admin</span>
                    </button>
                    <div id="profileDropdown" class="profile-dropdown">
                        <div class="profile-item logout-item" id="logoutDropdown">
                            <i class="uil uil-sign-out-alt"></i>
                            <span>Logout</span>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="wrapper admin-container" id="main-content" role="main">
           
            <div class="admin-header">
                <h1>
                    <i class="uil uil-setting"></i>
                    Chapter Management
                    <span class="admin-badge">ADMIN</span>
                </h1>
                <!-- <div class="admin-header-actions">
                    <div class="total-views-widget" id="totalViewsWidget">
                        <div class="total-views-info">
                            <div class="total-views-icon" aria-hidden="true">
                                <i class="uil uil-chart-line"></i>
                            </div>
                            <div>
                                <p class="total-views-title">Total Views:</p>
                                <p class="total-views-subtitle">Unique homepage visits</p>
                            </div>
                        </div>
                        <div class="total-views-badge" id="totalViewsBadge">--</div>
                    </div>
                </div>  
            </div> -->

            <div id="messageContainer"></div>

            <div class="admin-content">
                <!-- Class Selection -->
                <div class="class-tabs">
                    <h2>Classes</h2>
                    <div class="class-list" id="classList"></div>
                </div>

                <!-- Chapter Management -->
                <div class="chapters-management">
                    <h2>
                        <span>Chapters for <span id="selectedClassName">Class 6</span></span>
                        <button class="add-chapter-btn" onclick="openAddChapterModal()">
                            <i class="uil uil-plus"></i>
                            Add Chapter
                        </button>
                    </h2>

                    <div id="chaptersContainer"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Chapter Modal -->
    <div class="modal-overlay" id="chapterModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Chapter</h3>
                <button class="modal-close" onclick="closeChapterModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="chapterForm">
                    <div class="form-group">
                        <label for="chapterTitle">Chapter Title:</label>
                        <input type="text" id="chapterTitle" placeholder="e.g., Chapter 1 Notes" required>
                    </div>
                    <div class="form-group">
                        <label for="pdfFileName">PDF File Name:</label>
                        <input type="text" id="pdfFileName" placeholder="e.g., chapter-1.pdf" required>
                    </div>
                    <div class="form-group">
                        <label for="pdfFile">Upload PDF:</label>
                        <input type="file" id="pdfFile" accept=".pdf,application/pdf" onchange="handlePdfUpload(event)">
                        <small id="uploadHint" style="color: var(--text-color-second); display: block; margin-top: 8px;">
                            PDFs upload to Google Drive when configured. See GOOGLE-DRIVE-SETUP.md.
                        </small>
                        <div id="uploadProgress" style="display:none; margin-top:8px; color: var(--first-color); font-weight:600;">
                            <i class="uil uil-spinner-alt"></i> Uploading to Google Drive...
                        </div>
                    </div>
                </form>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeChapterModal()">Cancel</button>
                <button type="button" class="btn-primary" onclick="saveChapter()">Save Chapter</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/paths.js"></script>
    <script src="../assets/js/drive-config.js"></script>
    <script src="../assets/js/drive-service.js"></script>
    <script>
        let currentClass = '6';
        let currentChapterId = null;
        let chaptersData = {};
        let selectedPdfFile = null;
        let pendingDriveFileId = null;

        // Initialize
        async function init() {
            // Check if user is admin
            const userRole = sessionStorage.getItem('userRole');
            const username = sessionStorage.getItem('loggedInUser');
            
            if (!username || userRole !== 'admin') {
                alert('Access denied. Admin only.');
                window.location.href = SITE.pages.login;
                return;
            }

            updateDriveStatus();

            // Load chapters data
            await loadChaptersData();
            await loadTotalViewsWidget();
            initializeClassTabs();
            loadClassChapters('6');

            // Set profile username
            document.getElementById('profileUsername').textContent = username;
        }

        function updateDriveStatus() {
            const hint = document.getElementById('uploadHint');
            if (!hint) return;
            if (DriveService.isEnabled()) {
                hint.textContent = 'PDFs upload to your Google Drive folder. All students can view them after login.';
                hint.style.color = '#4CAF50';
            } else {
                hint.textContent = 'Google Drive not configured yet. Uploads save locally only until you follow GOOGLE-DRIVE-SETUP.md.';
            }
        }

        async function loadChaptersData() {
            try {
                chaptersData = await DriveService.fetchChapters();
                localStorage.setItem('chaptersData', JSON.stringify(chaptersData));
            } catch (err) {
                console.error('Error loading chapters:', err);
                chaptersData = {'6': {title: 'Class 6', chapters: []}, '7': {title: 'Class 7', chapters: []}, '8': {title: 'Class 8', chapters: []}, '9': {title: 'Class 9', chapters: []}, '10': {title: 'Class 10', chapters: []}};
            }
        }

        async function loadTotalViewsWidget() {
            const badge = document.getElementById('totalViewsBadge');
            const widget = document.getElementById('totalViewsWidget');
            if (!badge || !widget) return;

            try {
                const result = await DriveService.getViewCount();
                badge.textContent = result?.count ?? 0;
                widget.title = result?.fallback ? 'Showing local fallback while Apps Script is unavailable.' : 'Live count from Google Apps Script';
            } catch (err) {
                console.error('Error loading total views widget:', err);
                badge.textContent = '0';
                widget.title = 'Unable to load total views right now.';
            }
        }

        function initializeClassTabs() {
            const classList = document.getElementById('classList');
            classList.innerHTML = '';
            ['6', '7', '8', '9', '10'].forEach(classId => {
                const btn = document.createElement('button');
                btn.className = `class-tab ${classId === currentClass ? 'active' : ''}`;
                btn.textContent = `Class ${classId}`;
                btn.onclick = () => {
                    document.querySelectorAll('.class-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentClass = classId;
                    loadClassChapters(classId);
                };
                classList.appendChild(btn);
            });
        }

        function loadClassChapters(classId) {
            currentClass = classId;
            document.getElementById('selectedClassName').textContent = `Class ${classId}`;

            if (!chaptersData[classId]) {
                chaptersData[classId] = { title: `Class ${classId}`, chapters: [] };
            }

            const chapters = chaptersData[classId].chapters || [];
            const container = document.getElementById('chaptersContainer');

            if (chapters.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="uil uil-inbox"></i><p>No chapters yet. Add one to get started!</p></div>';
                return;
            }

            container.innerHTML = `
                <table class="chapters-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>PDF File</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${chapters.map((chapter, idx) => `
                            <tr>
                                <td>${chapter.title}</td>
                                <td>${chapter.pdfFile}${chapter.driveFileId ? ' <i class="uil uil-cloud-check" title="On Google Drive"></i>' : ''}</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="edit-btn" onclick="openEditChapterModal(${idx})">
                                            <i class="uil uil-edit"></i>
                                            Edit
                                        </button>
                                        <button class="delete-btn" onclick="deleteChapter(${idx})">
                                            <i class="uil uil-trash"></i>
                                            Delete
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function openAddChapterModal() {
            currentChapterId = null;
            selectedPdfFile = null;
            pendingDriveFileId = null;
            document.getElementById('modalTitle').textContent = 'Add Chapter';
            document.getElementById('chapterForm').reset();
            document.getElementById('chapterModal').classList.add('active');
        }

        function openEditChapterModal(chapterIdx) {
            currentChapterId = chapterIdx;
            selectedPdfFile = null;
            pendingDriveFileId = chaptersData[currentClass].chapters[chapterIdx].driveFileId || null;
            const chapter = chaptersData[currentClass].chapters[chapterIdx];
            
            document.getElementById('modalTitle').textContent = 'Edit Chapter';
            document.getElementById('chapterTitle').value = chapter.title;
            document.getElementById('pdfFileName').value = chapter.pdfFile;
            document.getElementById('chapterModal').classList.add('active');
        }

        function closeChapterModal() {
            document.getElementById('chapterModal').classList.remove('active');
            document.getElementById('chapterForm').reset();
            selectedPdfFile = null;
            pendingDriveFileId = null;
        }

        function handlePdfUpload(event) {
            const file = event.target.files[0];
            if (file) {
                if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
                    showMessage('Please select a PDF file only.', 'error');
                    event.target.value = '';
                    return;
                }
                selectedPdfFile = file;
                document.getElementById('pdfFileName').value = file.name;
            }
        }

        async function saveChapter() {
            const title = document.getElementById('chapterTitle').value.trim();
            const pdfFile = document.getElementById('pdfFileName').value.trim();
            const saveBtn = document.querySelector('#chapterModal .btn-primary');
            const progress = document.getElementById('uploadProgress');

            if (!title || !pdfFile) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            if (currentChapterId === null && !selectedPdfFile && !pendingDriveFileId && DriveService.isEnabled()) {
                showMessage('Please upload a PDF file', 'error');
                return;
            }

            if (!chaptersData[currentClass].chapters) {
                chaptersData[currentClass].chapters = [];
            }

            let driveFileId = pendingDriveFileId;
            if (currentChapterId !== null && !selectedPdfFile) {
                driveFileId = chaptersData[currentClass].chapters[currentChapterId].driveFileId || driveFileId;
            }

            try {
                if (selectedPdfFile) {
                    if (DriveService.isEnabled()) {
                        progress.style.display = 'block';
                        saveBtn.disabled = true;
                        const uploadResult = await DriveService.uploadPdf(selectedPdfFile);
                        console.log('PDF upload returned:', uploadResult);
                        if (!uploadResult || !uploadResult.fileId) {
                            throw new Error('Upload completed but did not return a file ID.');
                        }
                        driveFileId = uploadResult.fileId;
                        progress.style.display = 'none';
                    } else {
                        showMessage('Configure Google Drive first (see GOOGLE-DRIVE-SETUP.md) to upload PDFs online.', 'error');
                        return;
                    }
                }

                const chapter = {
                    id: currentChapterId !== null ? chaptersData[currentClass].chapters[currentChapterId].id : chaptersData[currentClass].chapters.length + 1,
                    title: title,
                    pdfFile: pdfFile,
                    driveFileId: driveFileId || null
                };

                if (currentChapterId !== null) {
                    chaptersData[currentClass].chapters[currentChapterId] = chapter;
                } else {
                    chaptersData[currentClass].chapters.push(chapter);
                }

                const saveResult = await DriveService.saveChapters(chaptersData);
                console.log('saveChapters returned:', saveResult);
                await loadChaptersData();

                const successMsg = currentChapterId !== null ? 'Chapter updated successfully!' : 'Chapter added successfully!';
                showMessage(
                    DriveService.isEnabled() && selectedPdfFile
                        ? successMsg + ' PDF uploaded to Google Drive.'
                        : successMsg,
                    'success'
                );

                progress.style.display = 'none';
                saveBtn.disabled = false;
                
                setTimeout(() => {
                    closeChapterModal();
                    loadClassChapters(currentClass);
                }, 500);
            } catch (err) {
                console.error('Save error:', err);
                showMessage('Error: ' + err.message, 'error');
                progress.style.display = 'none';
                saveBtn.disabled = false;
            }
        }

        async function deleteChapter(chapterIdx) {
            if (confirm('Are you sure you want to delete this chapter?')) {
                chaptersData[currentClass].chapters.splice(chapterIdx, 1);
                try {
                    await DriveService.saveChapters(chaptersData);
                    showMessage('Chapter deleted successfully!', 'success');
                } catch (err) {
                    showMessage('Error deleting: ' + err.message, 'error');
                }
                loadClassChapters(currentClass);
            }
        }

        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = `${type}-message`;
            msgDiv.innerHTML = `<i class="uil ${type === 'success' ? 'uil-check-circle' : 'uil-exclamation-circle'}"></i> ${message}`;
            container.innerHTML = '';
            container.appendChild(msgDiv);

            setTimeout(() => {
                msgDiv.remove();
            }, 3000);
        }

        // Logout handler
        document.getElementById('logoutDropdown').addEventListener('click', () => {
            sessionStorage.removeItem('loggedInUser');
            sessionStorage.removeItem('userRole');
            window.location.href = SITE.pages.login;
        });

        // Profile menu toggle
        document.getElementById('profileMenuToggle').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('profileDropdown').classList.toggle('active');
        });

        document.addEventListener('click', () => {
            document.getElementById('profileDropdown').classList.remove('active');
        });

        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeChapterModal();
            }
        });

        // Initialize
        init();
    </script>

    <!-- --------- MAIN JS ---------- -->
    <script src="../assets/js/main.js"></script>
</body>
</html>
