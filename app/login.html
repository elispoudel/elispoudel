            <h2>Welcome Back</h2>
            <p>Sign in with your username and password to continue.</p>
            <form id="login-form" class="modern-form" action="#" method="post" novalidate>
              <div class="form-group">
                <div class="input-container">
                  <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-input"
                    autocomplete="username"
                    placeholder=" "
                    required
                  />
                  <label for="username" class="form-label">Username</label>
                </div>
              </div>
              <div class="form-group">
                <div class="input-container password-container">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder=" "
                    required
                  />
                  <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">
                    <i class="uil uil-eye"></i>
                  </button>
                  <label for="password" class="form-label">Password</label>
                </div>
              </div>
              <div class="form-group">
                <button type="submit" class="btn btn-primary">
                  Log In
                  <i class="uil uil-sign-in-alt" aria-hidden="true"></i>
                </button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const passwordToggle = document.getElementById("passwordToggle");
        const avatar = document.querySelector(".login-avatar");
        const twoFingers = document.querySelector(".twoFingers");
        const armL = document.querySelector(".armL");
        const armR = document.querySelector(".armR");
        const eyeL = document.querySelector(".eyeL");
        const eyeR = document.querySelector(".eyeR");
        const nose = document.querySelector(".nose");
        const mouth = document.querySelector(".mouth");
        const mouthBG = document.querySelector(".mouthBG");
        const mouthSmallBG = document.querySelector(".mouthSmallBG");
        const mouthMediumBG = document.querySelector(".mouthMediumBG");
        const mouthLargeBG = document.querySelector(".mouthLargeBG");
        const mouthMaskPath = document.querySelector("#mouthMaskPath");
        const mouthOutline = document.querySelector(".mouthOutline");
        const tooth = document.querySelector(".tooth");
        const tongue = document.querySelector(".tongue");
        const chin = document.querySelector(".chin");
        const face = document.querySelector(".face");
        const eyebrow = document.querySelector(".eyebrow");
        const outerEarL = document.querySelector(".earL .outerEar");
        const outerEarR = document.querySelector(".earR .outerEar");
        const earHairL = document.querySelector(".earL .earHair");
        const earHairR = document.querySelector(".earR .earHair");
        const hair = document.querySelector(".hair");
        const bodyBG = document.querySelector(".bodyBGnormal");
        const bodyBGchanged = document.querySelector(".bodyBGchanged");

        if (!avatar || !usernameInput || !passwordInput || !passwordToggle || !eyeL || !eyeR || !armL || !armR) {
          return;
        }

        let activeElement = null;
        let curEmailIndex = 0;
        let screenCenter = 0;
        let svgCoords = null;
        let emailCoords = null;
        let emailScrollMax = 0;
        let chinMin = 0.5;
        let dFromC;
        let mouthStatus = "small";
        let blinking;
        let eyeScale = 1;
        let eyesCovered = false;
        let passwordVisible = false;
        let showPasswordClicked = false;
        let eyeLCoords;
        let eyeRCoords;
        let noseCoords;
        let mouthCoords;
        let eyeLAngle;
        let eyeLX;
        let eyeLY;
        let eyeRAngle;
        let eyeRX;
        let eyeRY;
        let noseAngle;
        let noseX;
        let noseY;
        let mouthAngle;
        let mouthX;
        let mouthY;
        let mouthR;
        let chinX;
        let chinY;
        let chinS;
        let faceX;
        let faceY;
        let faceSkew;
        let eyebrowSkew;
        let outerEarX;
        let outerEarY;
        let hairX;
        let hairS;

        function getPosition(el) {
          let xPos = 0;
          let yPos = 0;
          while (el) {
            xPos += el.offsetLeft - el.scrollLeft + el.clientLeft;
            yPos += el.offsetTop - el.scrollTop + el.clientTop;
            el = el.offsetParent;
          }
          return { x: xPos, y: yPos };
        }

        function getAngle(x1, y1, x2, y2) {
          return Math.atan2(y1 - y2, x1 - x2);
        }

        function getRandomInt(max) {
          return Math.floor(Math.random() * Math.floor(max));
        }

        function calculateFaceMove(e) {
          const caretPos = usernameInput.selectionEnd || usernameInput.value.length;
          const div = document.createElement("div");
          const span = document.createElement("span");
          const copyStyle = getComputedStyle(usernameInput);
          const caretCoords = {};

          Object.keys(copyStyle).forEach((prop) => {
            div.style[prop] = copyStyle[prop];
          });
          div.style.position = "absolute";
          document.body.appendChild(div);
          div.textContent = usernameInput.value.substr(0, caretPos);
          span.textContent = usernameInput.value.substr(caretPos) || ".";
          div.appendChild(span);

          if (usernameInput.scrollWidth <= emailScrollMax) {
            const position = getPosition(span);
            dFromC = screenCenter - (position.x + emailCoords.x);
            eyeLAngle = getAngle(eyeLCoords.x, eyeLCoords.y, emailCoords.x + position.x, emailCoords.y + 25);
            eyeRAngle = getAngle(eyeRCoords.x, eyeRCoords.y, emailCoords.x + position.x, emailCoords.y + 25);
            noseAngle = getAngle(noseCoords.x, noseCoords.y, emailCoords.x + position.x, emailCoords.y + 25);
            mouthAngle = getAngle(mouthCoords.x, mouthCoords.y, emailCoords.x + position.x, emailCoords.y + 25);
          } else {
            eyeLAngle = getAngle(eyeLCoords.x, eyeLCoords.y, emailCoords.x + emailScrollMax, emailCoords.y + 25);
            eyeRAngle = getAngle(eyeRCoords.x, eyeRCoords.y, emailCoords.x + emailScrollMax, emailCoords.y + 25);
            noseAngle = getAngle(noseCoords.x, noseCoords.y, emailCoords.x + emailScrollMax, emailCoords.y + 25);
            mouthAngle = getAngle(mouthCoords.x, mouthCoords.y, emailCoords.x + emailScrollMax, emailCoords.y + 25);
          }

          eyeLX = Math.cos(eyeLAngle) * 20;
          eyeLY = Math.sin(eyeLAngle) * 10;
          eyeRX = Math.cos(eyeRAngle) * 20;
          eyeRY = Math.sin(eyeRAngle) * 10;
          noseX = Math.cos(noseAngle) * 23;
          noseY = Math.sin(noseAngle) * 10;
          mouthX = Math.cos(mouthAngle) * 23;
          mouthY = Math.sin(mouthAngle) * 10;
          mouthR = Math.cos(mouthAngle) * 6;
          chinX = mouthX * 0.8;
          chinY = mouthY * 0.5;
          chinS = 1 - ((dFromC * 0.15) / 100);
          if (chinS > 1) {
            chinS = 1 - (chinS - 1);
            if (chinS < chinMin) chinS = chinMin;
          }
          faceX = mouthX * 0.3;
          faceY = mouthY * 0.4;
          faceSkew = Math.cos(mouthAngle) * 5;
          eyebrowSkew = Math.cos(mouthAngle) * 25;
          outerEarX = Math.cos(mouthAngle) * 4;
          outerEarY = Math.cos(mouthAngle) * 5;
          hairX = Math.cos(mouthAngle) * 6;
          hairS = 1.2;

          TweenMax.to(eyeL, 1, {x: -eyeLX, y: -eyeLY, ease: Expo.easeOut});
          TweenMax.to(eyeR, 1, {x: -eyeRX, y: -eyeRY, ease: Expo.easeOut});
          TweenMax.to(nose, 1, {x: -noseX, y: -noseY, rotation: mouthR, transformOrigin: "center center", ease: Expo.easeOut});
          TweenMax.to(mouth, 1, {x: -mouthX, y: -mouthY, rotation: mouthR, transformOrigin: "center center", ease: Expo.easeOut});
          TweenMax.to(chin, 1, {x: -chinX, y: -chinY, scaleY: chinS, ease: Expo.easeOut});
          TweenMax.to(face, 1, {x: -faceX, y: -faceY, skewX: -faceSkew, transformOrigin: "center top", ease: Expo.easeOut});
          TweenMax.to(eyebrow, 1, {x: -faceX, y: -faceY, skewX: -eyebrowSkew, transformOrigin: "center top", ease: Expo.easeOut});
          TweenMax.to(outerEarL, 1, {x: outerEarX, y: -outerEarY, ease: Expo.easeOut});
          TweenMax.to(outerEarR, 1, {x: outerEarX, y: outerEarY, ease: Expo.easeOut});
          TweenMax.to(earHairL, 1, {x: -outerEarX, y: -outerEarY, ease: Expo.easeOut});
          TweenMax.to(earHairR, 1, {x: -outerEarX, y: outerEarY, ease: Expo.easeOut});
          TweenMax.to(hair, 1, {x: hairX, scaleY: hairS, transformOrigin: "center bottom", ease: Expo.easeOut});

          document.body.removeChild(div);
        }

        function onEmailInput() {
          calculateFaceMove();
          const value = usernameInput.value;
          curEmailIndex = value.length;
          if (curEmailIndex > 0) {
            if (mouthStatus === "small") {
              mouthStatus = "medium";
              TweenMax.to([mouthBG, mouthOutline, mouthMaskPath], 1, {morphSVG: mouthMediumBG, shapeIndex: 8, ease: Expo.easeOut});
              TweenMax.to(tooth, 1, {x: 0, y: 0, ease: Expo.easeOut});
              TweenMax.to(tongue, 1, {x: 0, y: 1, ease: Expo.easeOut});
              TweenMax.to([eyeL, eyeR], 1, {scaleX: 0.85, scaleY: 0.85, ease: Expo.easeOut});
              eyeScale = 0.85;
            }
            if (value.includes("@")) {
              mouthStatus = "large";
              TweenMax.to([mouthBG, mouthOutline, mouthMaskPath], 1, {morphSVG: mouthLargeBG, ease: Expo.easeOut});
              TweenMax.to(tooth, 1, {x: 3, y: -2, ease: Expo.easeOut});
              TweenMax.to(tongue, 1, {y: 2, ease: Expo.easeOut});
              TweenMax.to([eyeL, eyeR], 1, {scaleX: 0.65, scaleY: 0.65, ease: Expo.easeOut, transformOrigin: "center center"});
              eyeScale = 0.65;
            } else {
              mouthStatus = "medium";
              TweenMax.to([mouthBG, mouthOutline, mouthMaskPath], 1, {morphSVG: mouthMediumBG, ease: Expo.easeOut});
              TweenMax.to(tooth, 1, {x: 0, y: 0, ease: Expo.easeOut});
              TweenMax.to(tongue, 1, {x: 0, y: 1, ease: Expo.easeOut});
              TweenMax.to([eyeL, eyeR], 1, {scaleX: 0.85, scaleY: 0.85, ease: Expo.easeOut});
              eyeScale = 0.85;
            }
          } else {
            mouthStatus = "small";
            TweenMax.to([mouthBG, mouthOutline, mouthMaskPath], 1, {morphSVG: mouthSmallBG, shapeIndex: 9, ease: Expo.easeOut});
            TweenMax.to(tooth, 1, {x: 0, y: 0, ease: Expo.easeOut});
            TweenMax.to(tongue, 1, {y: 0, ease: Expo.easeOut});
            TweenMax.to([eyeL, eyeR], 1, {scaleX: 1, scaleY: 1, ease: Expo.easeOut});
            eyeScale = 1;
          }
        }

        function onEmailFocus() {
          activeElement = "email";
          usernameInput.parentElement.classList.add("focusWithText");
          onEmailInput();
        }

        function onEmailBlur() {
          activeElement = null;
          setTimeout(() => {
            if (activeElement !== "email" && usernameInput.value === "") {
              usernameInput.parentElement.classList.remove("focusWithText");
            }
            resetFace();
          }, 100);
        }

        function spreadFingers() {
          TweenMax.to(twoFingers, 0.35, {
            transformOrigin: "bottom left",
            rotation: 16,
            x: -5,
            y: -1,
            ease: Power2.easeInOut
          });
        }

        function closeFingers() {
          TweenMax.to(twoFingers, 0.35, {
            transformOrigin: "bottom left",
            rotation: 0,
            x: 0,
            y: 0,
            ease: Power2.easeInOut
          });
        }

        function peekEyes() {
          TweenMax.killTweensOf([armL, armR]);
          TweenMax.set([armL, armR], {visibility: "visible"});
          TweenMax.to(armL, 0.45, {x: -93, y: 10, rotation: 0, ease: Quad.easeOut});
          TweenMax.to(armR, 0.45, {x: -93, y: 10, rotation: 0, ease: Quad.easeOut, delay: 0.1});
          TweenMax.to(bodyBG, 0.45, {morphSVG: bodyBGchanged, ease: Quad.easeOut});
          spreadFingers();
          eyesCovered = true;
        }

        function coverEyes() {
          TweenMax.killTweensOf([armL, armR]);
          TweenMax.set([armL, armR], {visibility: "visible"});
          TweenMax.to(armL, 0.45, {x: -93, y: 10, rotation: 0, ease: Quad.easeOut});
          TweenMax.to(armR, 0.45, {x: -93, y: 10, rotation: 0, ease: Quad.easeOut, delay: 0.1});
          TweenMax.to(bodyBG, 0.45, {morphSVG: bodyBGchanged, ease: Quad.easeOut});
          eyesCovered = true;
        }

        function onPasswordFocus() {
          activeElement = "password";
          if (passwordVisible) {
            peekEyes();
          } else if (!eyesCovered) {
            coverEyes();
          }
        }

        function onPasswordBlur() {
          activeElement = null;
          setTimeout(() => {
            if (activeElement !== "password" && activeElement !== "toggle") {
              if (passwordVisible) {
                peekEyes();
              } else {
                uncoverEyes();
              }
            }
          }, 100);
        }

        function onPasswordToggleFocus() {
          activeElement = "toggle";
          if (passwordVisible) {
            peekEyes();
          } else if (!eyesCovered) {
            coverEyes();
          }
        }

        function onPasswordToggleBlur() {
          activeElement = null;
          if (!showPasswordClicked) {
            setTimeout(() => {
              if (activeElement !== "password" && activeElement !== "toggle") {
                if (passwordVisible) {
                  peekEyes();
                } else {
                  uncoverEyes();
                }
              }
            }, 100);
          }
        }

        function onPasswordToggleMouseDown() {
          showPasswordClicked = true;
        }

        function onPasswordToggleMouseUp() {
          showPasswordClicked = false;
        }

        function uncoverEyes() {
          TweenMax.killTweensOf([armL, armR]);
          TweenMax.to(armL, 1.35, {y: 220, ease: Quad.easeOut});
          TweenMax.to(armL, 1.35, {rotation: 105, ease: Quad.easeOut, delay: 0.1});
          TweenMax.to(armR, 1.35, {y: 220, ease: Quad.easeOut});
          TweenMax.to(armR, 1.35, {rotation: -105, ease: Quad.easeOut, delay: 0.1, onComplete: () => {
            TweenMax.set([armL, armR], {visibility: "hidden"});
          }});
          TweenMax.to(bodyBG, 0.45, {morphSVG: bodyBG, ease: Quad.easeOut});
          eyesCovered = false;
        }

        function resetFace() {
          TweenMax.to([eyeL, eyeR], 1, {x: 0, y: 0, ease: Expo.easeOut});
          TweenMax.to(nose, 1, {x: 0, y: 0, scaleX: 1, scaleY: 1, ease: Expo.easeOut});
          TweenMax.to(mouth, 1, {x: 0, y: 0, rotation: 0, ease: Expo.easeOut});
          TweenMax.to(chin, 1, {x: 0, y: 0, scaleY: 1, ease: Expo.easeOut});
          TweenMax.to([face, eyebrow], 1, {x: 0, y: 0, skewX: 0, ease: Expo.easeOut});
          TweenMax.to([outerEarL, outerEarR, earHairL, earHairR, hair], 1, {x: 0, y: 0, scaleY: 1, ease: Expo.easeOut});
        }

        function startBlinking(delay) {
          if (delay) delay = getRandomInt(delay);
          else delay = 1;
          blinking = TweenMax.to([eyeL, eyeR], 0.1, {delay, scaleY: 0, yoyo: true, repeat: 1, transformOrigin: "center center", onComplete: () => startBlinking(12)});
        }

        function stopBlinking() {
          blinking.kill();
          blinking = null;
          TweenMax.set([eyeL, eyeR], {scaleY: eyeScale});
        }

        function initLoginForm() {
          svgCoords = getPosition(avatar);
          emailCoords = getPosition(usernameInput);
          screenCenter = svgCoords.x + (avatar.offsetWidth / 2);
          eyeLCoords = {x: svgCoords.x + 84, y: svgCoords.y + 76};
          eyeRCoords = {x: svgCoords.x + 113, y: svgCoords.y + 76};
          noseCoords = {x: svgCoords.x + 97, y: svgCoords.y + 81};
          mouthCoords = {x: svgCoords.x + 100, y: svgCoords.y + 100};
          usernameInput.addEventListener("focus", onEmailFocus);
          usernameInput.addEventListener("blur", onEmailBlur);
          usernameInput.addEventListener("input", onEmailInput);
          usernameInput.parentElement.addEventListener("click", () => usernameInput.focus());
          passwordInput.addEventListener("focus", onPasswordFocus);
          passwordInput.addEventListener("blur", onPasswordBlur);
          passwordToggle.addEventListener("focus", onPasswordToggleFocus);
          passwordToggle.addEventListener("blur", onPasswordToggleBlur);
          passwordToggle.addEventListener("mousedown", onPasswordToggleMouseDown);
          passwordToggle.addEventListener("mouseup", onPasswordToggleMouseUp);
          passwordToggle.addEventListener("click", () => {
            setTimeout(() => {
              if (passwordInput.type === "text") {
                passwordInput.type = "password";
                passwordToggle.innerHTML = '<i class="uil uil-eye"></i>';
                passwordToggle.setAttribute("aria-label", "Show password");
                passwordVisible = false;
                closeFingers();
                if (document.activeElement === passwordInput) {
                  coverEyes();
                } else {
                  uncoverEyes();
                }
              } else {
                passwordInput.type = "text";
                passwordToggle.innerHTML = '<i class="uil uil-eye-slash"></i>';
                passwordToggle.setAttribute("aria-label", "Hide password");
                passwordVisible = true;
                peekEyes();
              }
            }, 80);
          });
          TweenMax.set(armL, {x: -93, y: 220, rotation: 105, transformOrigin: "top left"});
          TweenMax.set(armR, {x: -93, y: 220, rotation: -105, transformOrigin: "top right"});
          TweenMax.set(mouth, {transformOrigin: "center center"});
          startBlinking(5);
          emailScrollMax = usernameInput.scrollWidth;
          TweenMax.set(avatar, {y: 0});
        }

        initLoginForm();
      });
    </script>
    <script src="../assets/js/paths.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
