<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6429ef" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Elis Poudel" />
    <link rel="manifest" href="../assets/manifest.json" />
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="icon" href="../assets/images/favicon/icons.png" sizes="192x192" />
    <title>Login | Elis Poudel</title>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="container">
      <nav id="header" role="navigation" aria-label="Primary navigation">
        <div class="nav-logo">
          <a href="../index.html" class="nav-logo-profile">
            <div class="nav-logo-text">
              <p class="nav-name">Elis Poudel</p>
            </div>
          </a>
        </div>
        <div class="nav-menu" id="myNavMenu">
          <ul class="nav_menu_list" role="menubar">
            <li class="nav_list" role="none">
              <a href="../index.html#home" class="nav-link" role="menuitem">Home</a>
            </li>
            <li class="nav_list" role="none">
              <a href="../index.html#skills" class="nav-link" role="menuitem">Skills</a>
            </li>
            <li class="nav_list" role="none">
              <a href="../index.html#projects" class="nav-link" role="menuitem">Projects</a>
            </li>
            <li class="nav_list" role="none">
              <a href="../index.html#contact" class="nav-link" role="menuitem">Contact</a>
            </li>
            <li class="nav_list" role="none">
              <a href="login.html" class="nav-link active-link" role="menuitem">Login</a>
            </li>
          </ul>
        </div>
        <div class="nav-icons">
          <div class="dark-mode-toggle">
            <button id="darkModeToggle" aria-label="Toggle dark mode">
              <i class="uil uil-moon" id="darkModeIcon"></i>
            </button>
          </div>
          <div class="nav-menu-btn">
            <button id="mobileMenuToggle" aria-label="Toggle mobile menu" aria-expanded="false">
              <i class="uil uil-bars" id="mobileMenuIcon"></i>
            </button>
          </div>
        </div>
      </nav>
      <main class="wrapper" id="main-content" role="main">
        <section class="login-page" aria-label="Login page">
          <div class="login-card glass-card">
            <h2>Welcome Back</h2>
            <p>Sign in with your username and password to continue.</p>
            <form id="login-form" class="modern-form" action="#" method="post" novalidate>
              <div class="form-group">
                <div class="input-container">
                  <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-input"
                    autocomplete="username"
                    placeholder=" "
                    required
                  />
                  <label for="username" class="form-label">Username</label>
                </div>
              </div>
              <div class="form-group">
                <div class="input-container">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder=" "
                    required
                  />
                  <label for="password" class="form-label">Password</label>
                  <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                    <i class="uil uil-eye" id="eyeIcon"></i>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <button type="submit" class="btn btn-primary">
                  Log In
                  <i class="uil uil-sign-in-alt" aria-hidden="true"></i>
                </button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
    <script src="../assets/js/paths.js"></script>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
